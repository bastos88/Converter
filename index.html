<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />

    <title>Conversor de Moedas</title>
</head>

<body>
    <header class="app-header">
        <img src="imgs/coverter-logo.svg" alt="Converter logo" class="logo" />
        <div class="brand">
            <h1>Conversor</h1>
            <p class="tagline">Cotações em tempo real • Simples e confiável</p>
        </div>
    </header>

    <main>
        <div class="card">
            <form>
                <div class="field">
                    <label for="value-input">Valor (BRL)</label>
                    <input type="text" name="amount" id="value-input" placeholder="0,00" inputmode="decimal" required />
                </div>

                <div class="row">
                    <div class="field">
                        <label for="currency-type">Moeda</label>
                        <select name="currency-type" id="currency-type" required>
                            <option value="" disabled selected hidden>Selecione a moeda</option>
                            <option value="USD">Dólar Americano</option>
                            <option value="EUR">Euro</option>
                            <option value="GBP">Libra Esterlina</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-primary">Converter</button>
                    </div>
                </div>
            </form>

            <div id="status" role="status" aria-live="polite" class="status"></div>

            <footer>
                <div class="rate"><span id="exchange-rate">US$ 1 = R$ 0,00</span></div>
                <h1 id="converted-value" class="result"></h1>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
